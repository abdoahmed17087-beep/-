<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الشرعي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Changa:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #064e3b;
            --gold: #d4af37;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
         font-family: 'Amiri', serif;
            background: radial-gradient(circle at center, #065f46, #022c22);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-family: 'Amiri', serif;
            color: var(--gold);
            font-size: 2.2rem;
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .message {
            margin-bottom: 15px;
            line-height: 1.6;
            padding: 12px;
            border-radius: 12px;
            max-width: 85%;
        }

        .user-msg {
            background: rgba(212, 175, 55, 0.2);
            align-self: flex-start;
            border-right: 4px solid var(--gold);
        }

        .bot-msg {
            background: rgba(255, 255, 255, 0.1);
            align-self: flex-end;
            border-left: 4px solid #10b981;
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--gold);
            color: var(--emerald);
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .loading { color: var(--gold); font-style: italic; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🕌 مجلس العلم الذكي</h1>
        <p>مرحباً بك يا بني.. تفضل بسؤالك الشرعي.</p>
    </div>

    <div id="chat-box">
        <div class="message bot-msg">الشيخ: وعليكم السلام ورحمة الله وبركاته، كيف أساعدك اليوم؟</div>
    </div>

    <div id="loading" class="loading">الشيخ يفكر في الإجابة...</div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب سؤالك هنا..." onkeypress="handleKey(event)">
        <button onclick="askQuestion()">اسأل</button>
    </div>
</div>

<script>
    async function askQuestion() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const loading = document.getElementById('loading');
        const question = input.value.trim();

        if (!question) return;

        // إضافة سؤال المستخدم
        appendMessage('user', `أنت: ${question}`);
        input.value = '';
        loading.style.display = 'block';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });

            const data = await response.json();
            
            // هنا بنقرأ reply اللي السيرفر بعتها
            appendMessage('bot', `الشيخ: ${data.reply || "عذراً يا بني، لم أستطع فهم السؤال."}`);

        } catch (error) {
            appendMessage('bot', 'الشيخ: حدث خطأ في الاتصال، تأكد من إعدادات السيرفر.');
        } finally {
            loading.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'bot-msg'}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter') askQuestion();
    }
</script>

</body>
</html>
